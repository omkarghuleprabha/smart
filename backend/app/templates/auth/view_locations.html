<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Location Directory | Smart Garbage Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.datatables.net/1.13.7/css/dataTables.bootstrap5.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root { --ap-green: #2ecc71; }
        body { background: #f1f5f9; padding: 40px 0; font-family: 'Inter', sans-serif; }
        .container-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        .filter-section { background: #f8fafc; padding: 25px; border-radius: 15px; border: 1px solid #e2e8f0; margin-bottom: 30px; }
        .badge-v { background: #dcfce7; color: #166534; padding: 6px 15px; border-radius: 20px; font-weight: 600; border: 1px solid #bbf7d0; }
        .form-label { font-size: 0.75rem; font-weight: 700; color: #64748b; text-transform: uppercase; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

<div class="container">
    <div class="container-card">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <h2 class="fw-bold text-dark m-0"><i class="bi bi-geo-alt-fill text-success"></i> Location Directory</h2>
            <a href="{{ url_for('auth_bp.register') }}" class="btn btn-outline-primary rounded-pill px-4">Back to Register</a>
        </div>

        <div class="filter-section shadow-sm">
            <div class="row g-3">
                <div class="col-md-5">
                    <label class="form-label">Step 1: Select District</label>
                    <select id="district_id" class="form-select border-1 shadow-sm">
                        <option value="">-- Choose District --</option>
                        {% for d in districts %}
                        <option value="{{ d.id }}">{{ d.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-5">
                    <label class="form-label">Step 2: Select Taluka</label>
                    <select id="taluka_id" class="form-select border-1 shadow-sm" disabled>
                        <option value="">Select District First</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button onclick="location.reload()" class="btn btn-dark w-100 rounded-3 fw-bold">Reset</button>
                </div>
            </div>
        </div>

        <div class="table-responsive">
            <table id="locTable" class="table table-hover align-middle">
                <thead>
                    <tr class="table-light">
                        <th>District</th>
                        <th>Taluka</th>
                        <th>Village / Ward</th>
                    </tr>
                </thead>
                <tbody>
                    </tbody>
            </table>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.7.0.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.7/js/dataTables.bootstrap5.min.js"></script>

<script>
    $(document).ready(function() {
        // 1. Initialize DataTable
        var table = $('#locTable').DataTable({
            "pageLength": 10,
            "language": { "emptyTable": "Select a District and Taluka above to view villages" }
        });

        const distDropdown = $('#district_id');
        const talDropdown = $('#taluka_id');

        // 2. Load Talukas (Using your exact Register logic)
        distDropdown.on('change', function() {
            const distId = $(this).val();
            if (!distId) {
                talDropdown.prop('disabled', true).empty().append('<option value="">Select District First</option>');
                return;
            }

            talDropdown.prop('disabled', false).empty().append('<option>Loading Talukas...</option>');

            fetch(`/auth/get_talukas/${distId}`)
                .then(response => response.json())
                .then(data => {
                    talDropdown.empty().append('<option value="">-- Select Taluka --</option>');
                    data.forEach(t => {
                        talDropdown.append(`<option value="${t.id}">${t.name}</option>`);
                    });
                });
        });

        // 3. Load Villages into Table (When Taluka is selected)
        talDropdown.on('change', function() {
            const talId = $(this).val();
            if (!talId) return;

            const dName = distDropdown.find("option:selected").text();
            const tName = $(this).find("option:selected").text();

            table.clear().draw(); // Clear old table data

            fetch(`/auth/get_villages/${talId}`)
                .then(response => response.json())
                .then(data => {
                    data.forEach(v => {
                        table.row.add([
                            `<span class="fw-bold">${dName}</span>`,
                            `<span class="text-secondary">${tName}</span>`,
                            `<span class="badge-v">${v.name}</span>`
                        ]);
                    });
                    table.draw();
                });
        });
    });
</script>
</body>
</html>
