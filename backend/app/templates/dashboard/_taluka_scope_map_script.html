<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
    const mapElement = document.getElementById('talukaScopeMap');
    if (!mapElement || typeof L === 'undefined') {
        return;
    }

    const mapData = {{ taluka_map|tojson }};
    const filterButtons = Array.from(document.querySelectorAll('[data-scope-filter]'));
    const actionButtons = Array.from(document.querySelectorAll('[data-scope-action]'));
    const listElement = document.getElementById('talukaScopeList');
    const statusElement = document.getElementById('talukaScopeStatus');
    const geocodeCache = new Map();
    const localStoragePrefix = 'smart-garbage-taluka-map:';
    const defaultCenter = mapData.center || { lat: 19.3, lng: 74.65 };
    let scopeMap = null;
    let markerLayer = null;
    let resolvedMarkers = [];
    let currentScopeMarkers = [];
    let defaultZoom = 10;

    function escapeHtml(value) {
        const div = document.createElement('div');
        div.textContent = value ?? '';
        return div.innerHTML;
    }

    function statusClass(status) {
        const normalized = String(status || 'pending').toLowerCase().replace('-', '_');
        if (normalized.includes('progress')) {
            return 'in_progress';
        }
        if (normalized === 'completed') {
            return 'completed';
        }
        if (normalized === 'assigned') {
            return 'assigned';
        }
        return 'pending';
    }

    function hashCoordinate(seed, center) {
        let hash = 0;
        const source = String(seed || 'scope');
        for (let index = 0; index < source.length; index += 1) {
            hash = source.charCodeAt(index) + ((hash << 5) - hash);
        }
        const angle = (Math.abs(hash) % 360) * (Math.PI / 180);
        const radius = 0.012 + ((Math.abs(hash) % 17) * 0.0022);
        return {
            lat: center.lat + (Math.sin(angle) * radius),
            lng: center.lng + (Math.cos(angle) * radius),
        };
    }

    function getStoredLocation(query) {
        try {
            const raw = localStorage.getItem(localStoragePrefix + query);
            return raw ? JSON.parse(raw) : null;
        } catch (error) {
            return null;
        }
    }

    function updateScopeStatus(message) {
        if (statusElement) {
            statusElement.textContent = message;
        }
    }

    function setStoredLocation(query, location) {
        try {
            localStorage.setItem(localStoragePrefix + query, JSON.stringify(location));
        } catch (error) {
            // Ignore storage write failures.
        }
    }

    async function geocodeQuery(query) {
        if (!query) {
            return null;
        }
        if (geocodeCache.has(query)) {
            return geocodeCache.get(query);
        }

        const stored = getStoredLocation(query);
        if (stored) {
            geocodeCache.set(query, stored);
            return stored;
        }

        try {
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=jsonv2&limit=1&q=${encodeURIComponent(query)}`);
            if (!response.ok) {
                throw new Error('Failed to geocode');
            }
            const results = await response.json();
            const match = results && results[0]
                ? { lat: Number(results[0].lat), lng: Number(results[0].lon) }
                : null;

            if (match) {
                geocodeCache.set(query, match);
                setStoredLocation(query, match);
            }

            return match;
        } catch (error) {
            return null;
        }
    }

    async function resolveCenter() {
        const geocodedCenter = await geocodeQuery(mapData.center_query);
        return geocodedCenter || defaultCenter;
    }

    async function resolveMarkers(center) {
        return Promise.all((mapData.markers || []).map(async (marker, index) => {
            const geocoded = await geocodeQuery(marker.map_query);
            return {
                ...marker,
                status_class: statusClass(marker.status),
                position: geocoded || hashCoordinate(marker.id || marker.location_label || index, center),
            };
        }));
    }

    function getIcon(marker) {
        return L.divIcon({
            className: 'scope-pin-shell',
            html: `<span class="scope-pin ${marker.category} ${marker.is_open ? '' : 'is-closed'}"></span>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9],
            popupAnchor: [0, -10],
        });
    }

    function popupMarkup(marker) {
        return `
            <div class="scope-popup-title">${escapeHtml(marker.title)}</div>
            <div class="scope-popup-meta">
                <div><strong>${escapeHtml(marker.category_label)}</strong> • ${escapeHtml(marker.status_label)}</div>
                <div>${escapeHtml(marker.location_label)}</div>
                <div>${escapeHtml(marker.secondary_label || '')}</div>
                <div>${escapeHtml(marker.time_label || 'N/A')}</div>
            </div>
        `;
    }

    function listMarkup(markers, activeFilter) {
        if (!markers.length) {
            const label = activeFilter === 'today' ? "today's" : activeFilter === 'open' ? 'open' : 'mapped';
            return `<div class="scope-map-empty">No ${label} items are available for this view.</div>`;
        }

        return markers.slice(0, 6).map((marker) => `
            <div class="scope-list-item">
                <div class="scope-list-top">
                    <div>
                        <div class="scope-list-title">${escapeHtml(marker.title)}</div>
                        <div class="scope-list-meta">${escapeHtml(marker.category_label)} • ${escapeHtml(marker.location_label)}</div>
                    </div>
                    <span class="scope-status-pill ${escapeHtml(marker.status_class)}">${escapeHtml(marker.status_label)}</span>
                </div>
                <div class="scope-list-meta">${escapeHtml(marker.secondary_label || '')}</div>
                <div class="scope-list-time">${escapeHtml(marker.time_label || 'N/A')}</div>
            </div>
        `).join('');
    }

    function focusScopeMarkers(markers) {
        if (!scopeMap) {
            return;
        }

        const bounds = (markers || [])
            .filter((marker) => marker && marker.position)
            .map((marker) => [marker.position.lat, marker.position.lng]);

        if (!bounds.length) {
            scopeMap.setView([defaultCenter.lat, defaultCenter.lng], defaultZoom);
            return;
        }

        if (bounds.length === 1) {
            scopeMap.setView(bounds[0], 12);
        } else {
            scopeMap.fitBounds(bounds, { padding: [28, 28] });
        }
    }

    function resetScopeMapView() {
        if (!scopeMap) {
            return;
        }

        scopeMap.setView([defaultCenter.lat, defaultCenter.lng], defaultZoom);
        updateScopeStatus(`Map reset to ${mapData.scope_label || 'taluka scope'}.`);
    }

    function applyFilter(mode) {
        if (!scopeMap || !markerLayer) {
            return;
        }

        const filteredMarkers = resolvedMarkers.filter((marker) => {
            if (mode === 'today') {
                return marker.is_today;
            }
            if (mode === 'open') {
                return marker.is_open;
            }
            return true;
        });
        currentScopeMarkers = filteredMarkers;

        filterButtons.forEach((button) => {
            button.classList.toggle('active', button.dataset.scopeFilter === mode);
        });

        markerLayer.clearLayers();
        listElement.innerHTML = listMarkup(filteredMarkers, mode);

        if (!filteredMarkers.length) {
            scopeMap.setView([defaultCenter.lat, defaultCenter.lng], 10);
            updateScopeStatus(`No ${mode === 'today' ? "today's" : mode === 'open' ? 'open' : 'mapped'} items are available in ${mapData.scope_label || 'this taluka scope'}.`);
            return;
        }

        filteredMarkers.forEach((marker) => {
            const leafletMarker = L.marker([marker.position.lat, marker.position.lng], { icon: getIcon(marker) })
                .bindPopup(popupMarkup(marker));
            markerLayer.addLayer(leafletMarker);
        });

        focusScopeMarkers(filteredMarkers);
        updateScopeStatus(`${filteredMarkers.length} item(s) mapped for ${mode === 'today' ? 'today' : mode === 'open' ? 'open work' : 'the full scope'} in ${mapData.scope_label || 'this taluka'}.`);
    }

    async function initializeScopeMap() {
        const center = await resolveCenter();
        defaultCenter.lat = center.lat;
        defaultCenter.lng = center.lng;

        scopeMap = L.map(mapElement, {
            zoomControl: true,
            scrollWheelZoom: true,
            dragging: true,
            touchZoom: true,
            doubleClickZoom: true,
            boxZoom: true,
            keyboard: true,
            zoomSnap: 0.5,
            wheelDebounceTime: 40,
        }).setView([center.lat, center.lng], 10);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            maxZoom: 18,
            attribution: '&copy; OpenStreetMap contributors',
        }).addTo(scopeMap);

        L.control.scale({
            imperial: false,
        }).addTo(scopeMap);

        markerLayer = L.layerGroup().addTo(scopeMap);
        resolvedMarkers = await resolveMarkers(center);
        resolvedMarkers.sort((left, right) => String(right.sort_at || '').localeCompare(String(left.sort_at || '')));

        const initialFilter = mapData.today_counts && mapData.today_counts.total > 0
            ? 'today'
            : mapData.open_total > 0
                ? 'open'
                : 'all';

        applyFilter(initialFilter);

        filterButtons.forEach((button) => {
            button.addEventListener('click', () => applyFilter(button.dataset.scopeFilter || 'all'));
        });

        actionButtons.forEach((button) => {
            button.addEventListener('click', () => {
                const action = button.dataset.scopeAction || '';
                if (action === 'focus') {
                    focusScopeMarkers(currentScopeMarkers);
                    if (currentScopeMarkers.length) {
                        updateScopeStatus(`Focused ${currentScopeMarkers.length} mapped item(s) in ${mapData.scope_label || 'this taluka scope'}.`);
                    } else {
                        updateScopeStatus(`No items are available to focus in ${mapData.scope_label || 'this taluka scope'}.`);
                    }
                    return;
                }

                if (action === 'reset') {
                    resetScopeMapView();
                }
            });
        });

        window.setTimeout(() => scopeMap.invalidateSize(), 180);
    }

    initializeScopeMap();
})();
</script>
