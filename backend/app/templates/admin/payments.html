<div class="card bg-dark text-light p-3">
    <h4>Subscription Tracking</h4>
    <table class="table table-dark table-striped">
        <thead>
            <tr>
                <th>Customer</th>
                <th>Monthly Rent</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody>
            {% for p in payments %}
            <tr>
                <td>{{ p.user_name }}</td>
                <td>₹{{ p.amount }}</td>
                <td><span class="badge bg-{{ 'success' if p.paid else 'danger' }}">
                    {{ 'Paid' if p.paid else 'Unpaid' }}
                </span></td>
                <td><button class="btn btn-sm btn-info">Send Reminder</button></td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
