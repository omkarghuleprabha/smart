<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Garbage Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css" rel="stylesheet">
    <style>
        :root { --ap-green: #28a745; --ap-blue: #0f172a; }
        body { 
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Poppins', sans-serif; margin: 0;
        }
        .login-card {
            background: white; border-radius: 20px; overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1); width: 900px; display: flex;
        }
        .login-info {
            background: var(--ap-blue); color: white; padding: 50px; width: 40%;
            display: flex; flex-direction: column; justify-content: center;
        }
        .login-form { padding: 50px; width: 60%; }
        
        .password-field-container { position: relative; }
        .toggle-password {
            position: absolute; right: 15px; top: 50%;
            transform: translateY(-50%); cursor: pointer; color: #888;
            z-index: 10;
        }

        .btn-primary-ap { 
            background: var(--ap-green); color: white; border: none; 
            border-radius: 10px; padding: 12px; width: 100%; font-weight: 700;
            transition: 0.3s;
        }
        .btn-primary-ap:hover { background: #218838; transform: scale(1.02); }
        
        .role-select {
            border: 2px solid #eef0f2; border-radius: 10px;
            font-weight: 600; color: var(--ap-blue);
        }

        .alert { border-radius: 12px; font-size: 0.85rem; font-weight: 600; border: none; }
    </style>
</head>
<body>

<div class="login-card animate__animated animate__zoomIn">
    <div class="login-info text-center">
        <h2 class="fw-bold mb-3">Welcome!</h2>
        <p class="small opacity-75">Access the <span id="dynamic-role-text" class="fw-bold text-warning">Citizen</span> Portal</p>
        <img src="https://www.adarpcleancity.com/assets/images/logo.png" class="img-fluid mt-4" style="filter: brightness(0) invert(1); max-width: 150px; margin: 0 auto;">
    </div>

    <div class="login-form">
        <h3 class="fw-bold mb-4 text-dark">Portal Login</h3>
        
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('auth_bp.login') }}" method="POST" autocomplete="off">
            <div class="mb-4">
                <label class="form-label small fw-bold">Login As</label>
                <select name="role" id="role_selector" class="form-select p-3 border-0 bg-light role-select" required>
                    <option value="user">Citizen</option>
                    <option value="worker">Worker</option>
                    <option value="admin">Taluka Admin</option>
                    <option value="district_admin">District Admin</option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label small fw-bold">Email or Phone Number</label>
                <input type="text" name="identifier" class="form-control p-3 border-0 bg-light" 
                       placeholder="Enter registered Email or Phone" 
                       autocomplete="off" required>
            </div>
            
            <div class="mb-4">
                <label class="form-label small fw-bold">Password</label>
                <div class="password-field-container">
                    <input type="password" name="password" id="login_pass" class="form-control p-3 border-0 bg-light" 
                           placeholder="••••••••" autocomplete="new-password" required>
                    <i class="fas fa-eye toggle-password" id="toggleIcon"></i>
                </div>
            </div>

            <div class="d-flex justify-content-end mb-4">
                <a href="#" class="small text-decoration-none text-success fw-bold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-primary-ap mb-3 shadow">LOGIN NOW</button>
            
            <p class="text-center small mb-0">Don't have an account? 
                <a href="{{ url_for('auth_bp.register') }}" class="text-success fw-bold text-decoration-none">Register Here</a>
            </p>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // 1. Password View Toggle Logic
    const togglePassword = document.querySelector('#toggleIcon');
    const passwordInput = document.querySelector('#login_pass');

    togglePassword.addEventListener('click', function () {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        this.classList.toggle('fa-eye-slash');
        this.classList.toggle('fa-eye');
    });

    // 2. Dynamic Sidebar Text Update
    const roleSelector = document.querySelector('#role_selector');
    const roleText = document.querySelector('#dynamic-role-text');

    roleSelector.addEventListener('change', function() {
        const selectedRole = roleSelector.options[roleSelector.selectedIndex].text;
        roleText.innerText = selectedRole;
    });

    // Handle initial state if role is passed in URL
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        const urlRole = params.get('role');
        if (urlRole) {
            roleSelector.value = urlRole;
            roleSelector.dispatchEvent(new Event('change'));
        }
    };
</script>
</body>
</html>
