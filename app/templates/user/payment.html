{% extends "layout/base.html" %}
{% block content %}
<div class="container py-5 text-center">
    <div class="card bg-dark text-white shadow-lg p-5 mx-auto" style="max-width: 450px; border: 1px solid #2d324d;">
        <h4 class="text-info mb-4">Complete Your Payment</h4>
        <div class="bg-white p-3 rounded-4 mb-4 d-inline-block">
            <img src="{{ qr_url }}" alt="UPI QR Code" class="img-fluid">
        </div>
        <p class="mb-1 text-muted">Amount to Pay:</p>
        <h2 class="fw-bold mb-4 text-warning">₹{{ order[7] }}</h2>
        
        <div class="alert alert-secondary py-2 border-0" style="background: #2d324d;">
            <small><i class="bi bi-shield-check me-2 text-success"></i>Secure UPI Payment</small>
        </div>
        
        <a href="/user/dashboard" class="btn btn-outline-info w-100 mt-3">Paid? Go to Dashboard</a>
    </div>
</div>
{% endblock %}
